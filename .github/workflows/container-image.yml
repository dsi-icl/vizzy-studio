name: Container Image (OCI)

on:
    push:
        branches:
            - develop
            - main
        tags:
            - 'v*'
    workflow_dispatch:
        inputs:
            include_sourcemaps:
                description: Keep JS sourcemaps in the container image for debugging
                required: false
                default: false
                type: boolean

permissions:
    contents: read
    packages: write

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE26: 'true'

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Normalize image owner
              id: prep
              run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

            - name: Build metadata
              id: meta
              run: |
                  echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
                  if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
                    echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
                  else
                    echo "version=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
                  fi

            - name: Resolve sourcemap mode
              id: sourcemaps
              run: |
                  if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.include_sourcemaps }}" == "true" ]]; then
                    echo "enabled=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "enabled=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Build OCI image with Buildah
              id: build
              uses: redhat-actions/buildah-build@v2
              with:
                  image: ${{ steps.prep.outputs.owner_lc }}/vizzy-studio
                  tags: |
                      sha-${{ github.sha }}
                      latest
                  containerfiles: |
                      ./Dockerfile
                  build-args: |
                      OCI_CREATED=${{ steps.meta.outputs.created }}
                      OCI_VERSION=${{ steps.meta.outputs.version }}
                      OCI_REVISION=${{ github.sha }}
                      OCI_SOURCE=https://github.com/${{ github.repository }}
                      BUILD_SOURCEMAPS=${{ steps.sourcemaps.outputs.enabled }}
                      KEEP_SOURCE_MAPS=${{ steps.sourcemaps.outputs.enabled }}
                      VITE_GIT_SHA=${{ github.sha }}
                      APP_COMMIT_SHA=${{ github.sha }}
                  oci: true

            - name: Push image to GHCR
              uses: redhat-actions/push-to-registry@v2
              with:
                  image: ${{ steps.build.outputs.image }}
                  tags: ${{ steps.build.outputs.tags }}
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
