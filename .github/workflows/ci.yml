name: CI

on:
    pull_request:
    push:
        branches:
            - develop
            - main

permissions:
    contents: read

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE26: 'true'

jobs:
    quality-and-build:
        runs-on: ubuntu-latest
        env:
            CI: true
            TURBO_TELEMETRY_DISABLED: '1'
            VITE_BASE_URL: http://localhost:3670
            SERVER_DATABASE_URL: mongodb://127.0.0.1:27017/vizzy?directConnection=true
            SERVER_AUTH_SECRET: 00000000000000000000000000000000
            SERVER_CONFIG_ENCRYPTION_KEY: ci-test-config-key
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: '26'

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1

            - name: Install dependencies
              run: bun install

            - name: Lint
              run: bun run lint

            - name: Format check
              run: bun run format:check

            - name: Build web app
              run: bun run build --filter=@repo/web

    security-harness:
        runs-on: ubuntu-latest
        needs: quality-and-build
        env:
            CI: true
            TURBO_TELEMETRY_DISABLED: '1'
            NODE_ENV: test
            WEB_HOST_PORT: 3870
            TEST_BASE_URL: http://127.0.0.1:3870
            VITE_BASE_URL: http://127.0.0.1:3870
            SERVER_DATABASE_URL: mongodb://127.0.0.1:37017/vizzy?replicaSet=rs0&directConnection=true
            SERVER_AUTH_SECRET: 00000000000000000000000000000000
            SERVER_CONFIG_ENCRYPTION_KEY: ci-test-config-key
            ALLOWED_HOSTS: http://127.0.0.1:3870
            TRUSTED_ORIGINS: http://127.0.0.1:3870
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: '26'

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1

            - name: Install dependencies
              run: bun install

            - name: Install Playwright browsers
              run: bunx playwright install --with-deps chromium

            - name: Start test stack
              run: bun run test:harness:up

            - name: Prepare harness fixtures
              run: bun run test:harness:prepare

            - name: Run integration suite
              run: bun run test:integration

            - name: Run end-to-end suite
              run: bun run test:e2e

            - name: Upload Playwright report
              if: ${{ failure() && (hashFiles('playwright-report/**') != '' || hashFiles('apps/web/playwright-report/**') != '') }}
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: |
                      playwright-report
                      apps/web/playwright-report
                  if-no-files-found: ignore

            - name: Stop test stack
              if: ${{ always() }}
              run: bun run test:harness:down
